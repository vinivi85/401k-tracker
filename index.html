<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>401(k) Tracker</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B1120" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="401k Tracker" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" href="icons/icon-192.png" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #0B1120; }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
<div id="root">
  <div style="min-height:100vh;background:#0B1120;display:flex;align-items:center;justify-content:center;color:#5EEAD4;font-family:monospace;font-size:13px;letter-spacing:2px;">
    CARREGANDO...
  </div>
</div>

<script>
(function () {
  'use strict';

  var h = React.createElement;
  var STORAGE_KEY = '401k-entries';

  var initialEntries = [
    { id: '1', date: '2026-06-07', balance: 17141.23 },
    { id: '2', date: '2026-06-15', balance: 17704.06 },
    { id: '3', date: '2026-06-17', balance: 17873.69 },
    { id: '4', date: '2026-06-18', balance: 17707.98 },
    { id: '5', date: '2026-06-19', balance: 17866.49 }
  ];

  function formatUSD(n) {
    return n.toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 });
  }

  function formatDateLabel(iso) {
    var parts = iso.split('-');
    var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10);
  }

  function loadEntries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      }
    } catch (e) {}
    return initialEntries;
  }

  function saveEntries(entries) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    } catch (e) {}
  }

  // Icons as plain SVG path data, rendered via createElement (no JSX needed)
  function Icon(props) {
    var paths = {
      plane: 'M21.5 15.5L15 12.7V7.2c0-1-.6-1.9-1.5-2.2-.3-.1-.6 0-.8.2L11 7.3 8.3 5.2c-.2-.2-.5-.3-.8-.2-.9.3-1.5 1.2-1.5 2.2v5.5L0 15.5v1.5l6-1.8v2.3l-1.7 1.3v1.2l3.2-1 .5-.1.5.1 3.2 1v-1.2L10 17.2v-2.3l6 1.8v-1.2z',
      up: 'M3 17l6-6 4 4 8-8 M14 7h7v7',
      down: 'M3 7l6 6 4-4 8 8 M21 10v7h-7',
      plus: 'M12 5v14 M5 12h14',
      trash: 'M3 6h18 M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6 M10 11v6 M14 11v6'
    };
    return h('svg', {
      width: props.size || 14,
      height: props.size || 14,
      viewBox: '0 0 24 24',
      fill: 'none',
      stroke: props.color || 'currentColor',
      strokeWidth: 2,
      strokeLinecap: 'round',
      strokeLinejoin: 'round',
      style: Object.assign({ display: 'inline-flex', flexShrink: 0, verticalAlign: 'middle' }, props.style || {})
    }, h('path', { d: paths[props.name] || '' }));
  }

  // Simple, dependency-free line chart rendered as inline SVG
  function MiniChart(props) {
    var data = props.data;
    var width = 320, height = 180, padX = 30, padY = 20;
    if (!data || data.length === 0) return h('div', null, 'Sem dados');

    var values = data.map(function (d) { return d.balance; });
    var min = Math.min.apply(null, values);
    var max = Math.max.apply(null, values);
    var range = (max - min) || 1;
    var pad = range * 0.2 || 100;
    min -= pad; max += pad; range = max - min;

    var stepX = data.length > 1 ? (width - padX * 2) / (data.length - 1) : 0;

    function xAt(i) { return padX + i * stepX; }
    function yAt(v) { return height - padY - ((v - min) / range) * (height - padY * 2); }

    var points = data.map(function (d, i) { return xAt(i) + ',' + yAt(d.balance); }).join(' ');

    var firstLineY = yAt(data[0].balance);

    var gridLines = [0, 0.25, 0.5, 0.75, 1].map(function (t, idx) {
      var y = padY + t * (height - padY * 2);
      return h('line', {
        key: 'grid' + idx, x1: padX, x2: width - padX, y1: y, y2: y,
        stroke: '#1F2937', strokeDasharray: '3 3', strokeWidth: 1
      });
    });

    var dots = data.map(function (d, i) {
      return h('circle', {
        key: 'dot' + i, cx: xAt(i), cy: yAt(d.balance), r: 4,
        fill: '#0B1120', stroke: '#5EEAD4', strokeWidth: 2
      });
    });

    var labels = data.map(function (d, i) {
      if (data.length > 6 && i % 2 !== 0 && i !== data.length - 1) return null;
      return h('text', {
        key: 'lbl' + i, x: xAt(i), y: height - 4, fontSize: 9,
        fill: '#6B7280', textAnchor: 'middle', fontFamily: 'JetBrains Mono, monospace'
      }, d.label);
    });

    return h('svg', { width: '100%', height: height, viewBox: '0 0 ' + width + ' ' + height, preserveAspectRatio: 'xMidYMid meet' },
      gridLines,
      h('line', { x1: padX, x2: width - padX, y1: firstLineY, y2: firstLineY, stroke: '#374151', strokeDasharray: '4 4', strokeWidth: 1 }),
      h('polyline', { points: points, fill: 'none', stroke: '#5EEAD4', strokeWidth: 2.5, strokeLinejoin: 'round', strokeLinecap: 'round' }),
      dots,
      labels
    );
  }

  function Tracker401k() {
    var state = React.useState(loadEntries());
    var entries = state[0], setEntries = state[1];

    var formState = React.useState(false);
    var showForm = formState[0], setShowForm = formState[1];

    var dateState = React.useState('');
    var newDate = dateState[0], setNewDate = dateState[1];

    var balState = React.useState('');
    var newBalance = balState[0], setNewBalance = balState[1];

    var errState = React.useState('');
    var error = errState[0], setError = errState[1];

    var sorted = entries.slice().sort(function (a, b) { return new Date(a.date) - new Date(b.date); });
    var latest = sorted[sorted.length - 1];
    var first = sorted[0];
    var prev = sorted.length > 1 ? sorted[sorted.length - 2] : null;

    var totalChange = (latest && first) ? latest.balance - first.balance : 0;
    var totalChangePct = (latest && first && first.balance) ? (totalChange / first.balance) * 100 : 0;
    var dayChange = (latest && prev) ? latest.balance - prev.balance : 0;
    var dayChangePct = (latest && prev && prev.balance) ? (dayChange / prev.balance) * 100 : 0;

    var chartData = sorted.map(function (e) {
      return { date: e.date, label: formatDateLabel(e.date), balance: e.balance };
    });

    function handleAdd() {
      setError('');
      if (!newDate) { setError('Selecione uma data.'); return; }
      var bal = parseFloat(newBalance);
      if (!newBalance || isNaN(bal)) { setError('Informe um saldo válido.'); return; }
      var entry = { id: Date.now().toString(), date: newDate, balance: bal };
      var next = entries.filter(function (e) { return e.date !== newDate; }).concat([entry]);
      setEntries(next);
      saveEntries(next);
      setNewDate('');
      setNewBalance('');
      setShowForm(false);
    }

    function handleDelete(id) {
      var next = entries.filter(function (e) { return e.id !== id; });
      setEntries(next);
      saveEntries(next);
    }

    var entryRows = sorted.slice().reverse().map(function (e, idx) {
      var sortedIdx = sorted.length - 1 - idx;
      var prevEntry = sortedIdx > 0 ? sorted[sortedIdx - 1] : null;
      var diff = prevEntry ? e.balance - prevEntry.balance : 0;
      return h('div', { key: e.id, style: S.entryRow },
        h('div', { style: S.entryDate }, formatDateLabel(e.date) + " '26"),
        h('div', { style: S.entryBalance }, formatUSD(e.balance)),
        h('div', { style: Object.assign({}, S.entryDiff, { color: !prevEntry ? '#6B7280' : (diff >= 0 ? '#5EEAD4' : '#FB7185') }) },
          prevEntry ? ((diff >= 0 ? '+' : '') + formatUSD(diff)) : 'BASE'),
        h('button', { style: S.deleteBtn, onClick: function () { handleDelete(e.id); } }, h(Icon, { name: 'trash', size: 13 }))
      );
    });

    return h('div', { style: S.app },
      h('div', { style: S.headerStrip },
        h('div', { style: S.headerLeft },
          h(Icon, { name: 'plane', size: 16, color: '#5EEAD4', style: { transform: 'rotate(45deg)' } }),
          h('span', { style: S.headerLabel }, 'AA 401(K) · FLIGHT DECK')
        ),
        h('div', { style: S.headerRight }, 'OFFLINE-READY')
      ),

      h('div', { style: S.gaugeCard },
        h('div', { style: S.gaugeLabel }, 'SALDO ATUAL'),
        h('div', { style: S.gaugeValue }, latest ? formatUSD(latest.balance) : '—'),
        h('div', { style: S.gaugeDate }, latest ? ('ÚLTIMA LEITURA · ' + formatDateLabel(latest.date).toUpperCase() + ' 2026') : 'SEM DADOS'),

        h('div', { style: S.deltaRow },
          h('div', { style: S.deltaBox },
            h('div', { style: S.deltaLabel }, 'DESDE ÚLTIMA LEITURA'),
            h('div', { style: Object.assign({}, S.deltaValue, { color: dayChange >= 0 ? '#5EEAD4' : '#FB7185' }) },
              h(Icon, { name: dayChange >= 0 ? 'up' : 'down', size: 14 }),
              (dayChange >= 0 ? '+' : '') + formatUSD(dayChange),
              h('span', { style: S.deltaPct }, '(' + (dayChangePct >= 0 ? '+' : '') + dayChangePct.toFixed(2) + '%)')
            )
          ),
          h('div', { style: S.deltaDivider }),
          h('div', { style: S.deltaBox },
            h('div', { style: S.deltaLabel }, 'DESDE O INÍCIO'),
            h('div', { style: Object.assign({}, S.deltaValue, { color: totalChange >= 0 ? '#5EEAD4' : '#FB7185' }) },
              h(Icon, { name: totalChange >= 0 ? 'up' : 'down', size: 14 }),
              (totalChange >= 0 ? '+' : '') + formatUSD(totalChange),
              h('span', { style: S.deltaPct }, '(' + (totalChangePct >= 0 ? '+' : '') + totalChangePct.toFixed(2) + '%)')
            )
          )
        )
      ),

      h('div', { style: S.chartCard },
        h('div', { style: S.chartHeader },
          h('span', { style: S.chartTitle }, 'ALTÍMETRO DE SALDO'),
          h('span', { style: S.chartSub }, sorted.length + ' leituras')
        ),
        h(MiniChart, { data: chartData })
      ),

      h('div', { style: S.logCard },
        h('div', { style: S.logHeader },
          h('span', { style: S.chartTitle }, 'REGISTRO DE LEITURAS'),
          h('button', { style: S.addBtn, onClick: function () { setShowForm(!showForm); } },
            h(Icon, { name: 'plus', size: 14 }),
            showForm ? 'CANCELAR' : 'NOVA LEITURA'
          )
        ),

        showForm ? h('div', { style: S.formBox },
          h('div', { style: S.formRow },
            h('label', { style: S.formLabel }, 'DATA'),
            h('input', {
              type: 'date', value: newDate, style: S.input, max: '2026-12-31',
              onChange: function (ev) { setNewDate(ev.target.value); }
            })
          ),
          h('div', { style: S.formRow },
            h('label', { style: S.formLabel }, 'SALDO (USD)'),
            h('input', {
              type: 'number', step: '0.01', placeholder: '17866.49', value: newBalance, style: S.input,
              onChange: function (ev) { setNewBalance(ev.target.value); }
            })
          ),
          error ? h('div', { style: S.errorText }, error) : null,
          h('button', { style: S.submitBtn, onClick: handleAdd }, 'REGISTRAR LEITURA')
        ) : null,

        h('div', { style: S.entryList }, entryRows)
      ),

      h('div', { style: S.footer }, 'DADOS SALVOS NESTE DISPOSITIVO · NETBENEFITS / FIDELITY')
    );
  }

  var S = {
    app: { minHeight: '100vh', background: '#0B1120', color: '#E5E7EB', fontFamily: "'Inter', sans-serif", padding: '0 0 32px 0', maxWidth: 480, margin: '0 auto' },
    headerStrip: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 20px', borderBottom: '1px solid #1F2937' },
    headerLeft: { display: 'flex', alignItems: 'center', gap: 8 },
    headerLabel: { fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: 1.5, color: '#9CA3AF' },
    headerRight: { fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#4B5563', letterSpacing: 1 },
    gaugeCard: { margin: '20px 16px 0', padding: '24px 20px', background: 'linear-gradient(160deg, #111827 0%, #0B1120 100%)', border: '1px solid #1F2937', borderRadius: 16 },
    gaugeLabel: { fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: 2, color: '#6B7280', marginBottom: 6 },
    gaugeValue: { fontFamily: "'JetBrains Mono', monospace", fontSize: 40, fontWeight: 700, color: '#F9FAFB', letterSpacing: -1, lineHeight: 1.1 },
    gaugeDate: { fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#4B5563', letterSpacing: 1, marginTop: 4, marginBottom: 18 },
    deltaRow: { display: 'flex', alignItems: 'stretch', gap: 16 },
    deltaBox: { flex: 1 },
    deltaDivider: { width: 1, background: '#1F2937' },
    deltaLabel: { fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: 1, color: '#6B7280', marginBottom: 4 },
    deltaValue: { fontFamily: "'JetBrains Mono', monospace", fontSize: 15, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' },
    deltaPct: { fontSize: 11, opacity: 0.7, marginLeft: 2 },
    chartCard: { margin: '14px 16px 0', padding: '16px 8px 8px 12px', background: '#111827', border: '1px solid #1F2937', borderRadius: 16 },
    chartHeader: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0 8px 8px 4px' },
    chartTitle: { fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: 1.5, color: '#9CA3AF' },
    chartSub: { fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#4B5563' },
    logCard: { margin: '14px 16px 0', padding: '16px', background: '#111827', border: '1px solid #1F2937', borderRadius: 16 },
    logHeader: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 },
    addBtn: { display: 'flex', alignItems: 'center', gap: 4, background: '#134E4A', color: '#5EEAD4', border: '1px solid #115E59', borderRadius: 8, padding: '6px 10px', fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 0.5, cursor: 'pointer' },
    formBox: { background: '#0B1120', border: '1px solid #1F2937', borderRadius: 12, padding: 14, marginBottom: 14, display: 'flex', flexDirection: 'column', gap: 10 },
    formRow: { display: 'flex', flexDirection: 'column', gap: 4 },
    formLabel: { fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: 1, color: '#6B7280' },
    input: { background: '#111827', border: '1px solid #374151', borderRadius: 8, padding: '10px 12px', color: '#F9FAFB', fontFamily: "'JetBrains Mono', monospace", fontSize: 14, outline: 'none', WebkitAppearance: 'none' },
    errorText: { color: '#FB7185', fontSize: 12, fontFamily: "'JetBrains Mono', monospace" },
    submitBtn: { background: '#5EEAD4', color: '#0B1120', border: 'none', borderRadius: 8, padding: '10px', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 12, letterSpacing: 1, cursor: 'pointer', marginTop: 2 },
    entryList: { display: 'flex', flexDirection: 'column', gap: 2 },
    entryRow: { display: 'grid', gridTemplateColumns: '64px 1fr 100px 24px', alignItems: 'center', padding: '10px 4px', borderBottom: '1px solid #1A2333', gap: 8 },
    entryDate: { fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#9CA3AF' },
    entryBalance: { fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 600, color: '#F9FAFB' },
    entryDiff: { fontFamily: "'JetBrains Mono', monospace", fontSize: 11, textAlign: 'right' },
    deleteBtn: { background: 'transparent', border: 'none', color: '#4B5563', cursor: 'pointer', padding: 4, display: 'flex' },
    footer: { textAlign: 'center', fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#374151', letterSpacing: 1, marginTop: 20 }
  };

  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(h(Tracker401k));

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
})();
</script>
</body>
</html>
